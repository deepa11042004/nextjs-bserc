name: Deploy Next.js to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Debug username (safe)
      - name: Debug Docker Username
        run: echo "Using Docker username: ${{ secrets.DOCKER_USERNAME }}"

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build & Push image
      - name: Build & Push Docker image
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc:latest \
          --push .

      # 6. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc:latest

            # Stop & remove old container
            docker stop nextjs-app || true
            docker rm nextjs-app || true

            # Free port 80 if already in use
            sudo fuser -k 80/tcp || true

            # Run new container
            docker run -d \
              -p 80:3000 \
              --name nextjs-app \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc:latest
