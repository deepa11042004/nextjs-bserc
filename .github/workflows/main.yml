name: Deploy Next.js to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc
      IMAGE_TAG: ${{ github.sha }}

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Docker image (UPDATED ✅)
      - name: Build Docker image
        run: |
          docker build \
          --build-arg API_URL=${{ secrets.API_URL }} \
          -t $IMAGE_NAME:$IMAGE_TAG \
          -t $IMAGE_NAME:latest .

      # 4️⃣ Push to Docker Hub
      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc:${{ github.sha }}

            docker stop nextjs-app || true
            docker rm nextjs-app || true

            # FREE PORT 3000
            sudo fuser -k 3000/tcp || true

            # RUN WITH ENV (OPTIONAL BUT SAFE ✅)
            docker run -d -p 3000:3000 \
            -e API_URL=${{ secrets.API_URL }} \
            --name nextjs-app \
            ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc:${{ github.sha }}

            # CLEANUP UNUSED IMAGES TO SAVE DISK SPACE
            docker image prune -af || true
