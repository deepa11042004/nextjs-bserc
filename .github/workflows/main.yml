name: Deploy Next.js to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & Push Docker image
      - name: Build & Push Docker image
        run: |
          docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc:latest \
          --push .

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc:latest

            docker stop nextjs-app || true
            docker rm nextjs-app || true

            # FREE PORT 3000 (important)
            sudo fuser -k 3000/tcp || true

            docker run -d -p 3000:3000 --name nextjs-app ${{ secrets.DOCKER_USERNAME }}/nextjs-bserc:latest
